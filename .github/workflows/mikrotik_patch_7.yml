name: Patch Mikrotik RouterOS 7.x
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture (mipsbe, x86, arm64, arm)'
        required: true
        default: 'mipsbe'
        type: choice
        options:
          - mipsbe
          - x86
          - arm64
          - arm
      channel:
        description: 'Channel (stable, testing)'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - long-term
          - testing
      version:
        description: "Specify version (e.g., 7.15.3), empty for latest"
        required: false
        default: '7.15.3'
        type: string
      buildtime:
        description: "Custom build time, leave empty"
        required: false
        default: ''
        type: string
      release:
        description: "Release to GitHub & Upload"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  Set_Variables:
    runs-on: ubuntu-22.04
    outputs:
      BUILD_TIME: ${{ steps.set_vars.outputs.BUILD_TIME }}
      RELEASE: ${{ steps.set_vars.outputs.RELEASE }}
      MATRIX_JSON: ${{ steps.set_vars.outputs.MATRIX_JSON }}
    steps:
      - name: Set variables
        id: set_vars
        run: |
          BUILD_TIME="${{ github.event.inputs.buildtime }}"
          RELEASE="${{ github.event.inputs.release }}"
          if [ -z "$BUILD_TIME" ]; then BUILD_TIME=$(date +'%s'); fi
          if [ -z "$RELEASE" ]; then RELEASE=false; fi
          ARCH="${{ github.event.inputs.arch }}"
          CHANNEL="${{ github.event.inputs.channel }}"
          MATRIX_JSON=$(jq -nc --arg arch "$ARCH" --arg channel "$CHANNEL" '[{arch: $arch, channel: $channel}]')
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "RELEASE=$RELEASE" >> $GITHUB_OUTPUT
          echo "MATRIX_JSON=$MATRIX_JSON" >> $GITHUB_OUTPUT

  Patch_RouterOS:
    needs: Set_Variables
    runs-on: ubuntu-22.04
    strategy:
      matrix: 
        include: ${{ fromJSON(needs.Set_Variables.outputs.MATRIX_JSON) }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    - name: Get latest routeros version
      id: get_latest
      run: |
        # Correction des URLs pour éviter l'erreur "Invalid host name"
        MIKRO_URL="://mikrotik.com"
        if [ -n "${{ github.event.inputs.version }}" ]; then
          LATEST_VERSION="${{ github.event.inputs.version }}"
        else
          LATEST_VERSION=$(wget -nv -O - https://$MIKRO_URL/routeros/NEWESTa7.${{ matrix.channel }} | cut -d ' ' -f1)
        fi
        echo "LATEST_VERSION=${LATEST_VERSION}" >> $GITHUB_ENV
        echo "Version à patcher : $LATEST_VERSION"
        
        # Téléchargement du Changelog
        wget -nv -O CHANGELOG https://$MIKRO_URL/routeros/$LATEST_VERSION/CHANGELOG
        
        # Gestion du suffixe d'architecture pour le fichier .npk
        if [[ "${{ matrix.arch }}" == "arm64" ]]; then
          echo "ARCH_SUFFIX=-arm64" >> $GITHUB_ENV
        elif [[ "${{ matrix.arch }}" == "arm" ]]; then
          echo "ARCH_SUFFIX=-arm" >> $GITHUB_ENV
        elif [[ "${{ matrix.arch }}" == "mipsbe" ]]; then
          echo "ARCH_SUFFIX=-mipsbe" >> $GITHUB_ENV
        else
          echo "ARCH_SUFFIX=" >> $GITHUB_ENV
        fi

    - name: Download Original NPK
      run: |
        # Téléchargement du paquet officiel pour mipsbe (ou autre)
        wget -nv https://mikrotik.com{{ env.LATEST_VERSION }}/routeros-${{ env.LATEST_VERSION }}${{ env.ARCH_SUFFIX }}.npk

    - name: Apply Patch
      run: |
        # Ici le script utilise patch.py présent dans votre dépôt
        # Assurez-vous que patch.py est à la racine de votre dossier Code
        python3 patch.py routeros-${{ env.LATEST_VERSION }}${{ env.ARCH_SUFFIX }}.npk --out patched.npk

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.arch }}-patched
        path: patched.npk
